Continuous-Deployment:
    needs: Continuous-Integration
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Docker Image to serve users
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}   # ✅ Capture it here
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          # 1. Login with sudo docker using the env var (not inline expression)
          aws ecr get-login-password --region "$AWS_REGION" \
            | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

          # 2. Stop and remove old container
          sudo docker stop medicalbot || true
          sudo docker rm medicalbot || true

          # 3. Prune old images
          sudo docker image prune -f

          # 4. Pull latest image
          sudo docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          # 5. Run new container
          sudo docker run -d --name medicalbot -p 80:8000 \
            -e PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            -e HUGGINGFACE_API_KEY="${{ secrets.HUGGINGFACE_API_KEY }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest"